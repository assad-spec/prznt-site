<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work — Prznt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:    #FAF9F6;
            --ink:   #2D2B28;
            --muted: #6B655D;
            --slate: #A89B7A;
            --rule:  #E8E6E1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); overflow: hidden; -webkit-font-smoothing: antialiased; }
        canvas { display: block; }

        #vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(
                ellipse 85% 85% at 50% 50%,
                transparent 40%,
                rgba(250, 249, 246, 0.45) 72%,
                rgba(250, 249, 246, 0.88) 100%
            );
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="vignette"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        const BG    = 0xFAF9F6;
        const SLATE = 0xA89B7A;

        // ── Canvas card helper ────────────────────────────────────
        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function hexToCSS(hex) {
            return '#' + hex.toString(16).padStart(6, '0');
        }

        function makeCard(title, body, accentColor, featured) {
            const W      = 512;
            const barW   = 10;
            const pad    = featured ? 28 : 22;
            const lhTitle = featured ? 52 : 34;
            const lhBody  = featured ? 26 : 24;

            // Measure body lines
            const bodyLines = wrapText(body, featured ? 22 : 19, 440);
            const H = pad + lhTitle + (bodyLines.length > 0 ? 10 + bodyLines.length * lhBody : 0) + pad;

            const canvas  = document.createElement('canvas');
            canvas.width  = W;
            canvas.height = H;
            const ctx     = canvas.getContext('2d');

            // Shadow
            ctx.shadowColor   = 'rgba(45, 43, 40, 0.14)';
            ctx.shadowBlur    = 20;
            ctx.shadowOffsetY = 5;

            // Background
            ctx.fillStyle = '#FAF9F6';
            roundRect(ctx, 0, 0, W, H, 16);
            ctx.fill();

            ctx.shadowColor = 'transparent';

            // Accent bar
            ctx.fillStyle = hexToCSS(accentColor);
            roundRect(ctx, 0, 0, barW + 4, H, [16, 0, 0, 16]);
            ctx.fill();
            ctx.fillRect(barW, 0, 4, H);

            // Border
            ctx.strokeStyle = '#E8E6E1';
            ctx.lineWidth   = 1.5;
            roundRect(ctx, 1, 1, W - 2, H - 2, 15);
            ctx.stroke();

            // Title
            ctx.textBaseline = 'top';
            ctx.textAlign    = 'left';
            ctx.fillStyle    = '#2D2B28';
            ctx.font         = featured
                ? '400 38px "Cormorant Garamond", Georgia, serif'
                : '600 22px Inter, -apple-system, sans-serif';
            ctx.fillText(title, barW + 20, pad);

            // Body lines
            ctx.fillStyle = '#6B655D';
            ctx.font      = `300 ${featured ? 20 : 17}px Inter, -apple-system, sans-serif`;
            bodyLines.forEach((line, i) => {
                ctx.fillText(line, barW + 20, pad + lhTitle + 10 + i * lhBody);
            });

            return new THREE.CanvasTexture(canvas);
        }

        // Simple word-wrap
        function wrapText(text, fontSize, maxWidth) {
            const testCanvas = document.createElement('canvas');
            const ctx = testCanvas.getContext('2d');
            ctx.font = `300 ${fontSize}px Inter, -apple-system, sans-serif`;
            const words = text.split(' ');
            const lines = [];
            let current = '';
            words.forEach(word => {
                const test = current ? current + ' ' + word : word;
                if (ctx.measureText(test).width > maxWidth && current) {
                    lines.push(current);
                    current = word;
                } else {
                    current = test;
                }
            });
            if (current) lines.push(current);
            return lines;
        }

        // ── Scene ─────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(BG);
        scene.fog        = new THREE.Fog(BG, 20, 38);

        const camera = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, 0.1, 100);
        camera.position.set(0, 0.4, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping    = true;
        controls.dampingFactor    = 0.06;
        controls.autoRotate       = true;
        controls.autoRotateSpeed  = 0.25;
        controls.minDistance      = 4;
        controls.maxDistance      = 20;
        controls.target.set(0, 0, 0);

        // ── Lights ────────────────────────────────────────────────
        scene.add(new THREE.AmbientLight(0xfaf9f6, 1.0));

        // ── Card data ─────────────────────────────────────────────
        // 4 cards: 1 featured center, 3 satellites
        // Positions chosen for organic depth variation
        const CARDS = [
            {
                title:    'Prznt',
                body:     'First engagement.',
                color:    SLATE,
                pos:      [0, 0, 1.2],
                featured: true,
                phase:    0,
            },
            {
                title:    'Problem',
                body:     'Constant decisions across design, copy, and operations. No repeatable process.',
                color:    0x4a7fd4,
                pos:      [-2.8, 1.4, -1.0],
                featured: false,
                phase:    1.3,
            },
            {
                title:    'Built',
                body:     'Three custom skills: visual design and code, written communications, methodology.',
                color:    0x3d9e82,
                pos:      [2.6, -0.6, -1.8],
                featured: false,
                phase:    2.6,
            },
            {
                title:    'Result',
                body:     'The site, this copy, and the operating system — all built using the method.',
                color:    0x5dad6a,
                pos:      [-1.0, -2.0, -0.4],
                featured: false,
                phase:    4.1,
            },
        ];

        const cardMeshes = [];

        document.fonts.ready.then(() => {
            CARDS.forEach((data, i) => {
                const tex = makeCard(data.title, data.body, data.color, data.featured);

                // Infer card height from texture dimensions
                const imgH  = tex.image.height;
                const imgW  = tex.image.width;
                const worldW = data.featured ? 3.2 : 2.8;
                const worldH = worldW * (imgH / imgW);

                const geo = new THREE.PlaneGeometry(worldW, worldH);
                const mat = new THREE.MeshBasicMaterial({
                    map:         tex,
                    transparent: true,
                    depthWrite:  false,
                    side:        THREE.DoubleSide,
                });

                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(...data.pos);
                scene.add(mesh);

                cardMeshes.push({ mesh, baseY: data.pos[1], phase: data.phase });
            });

            // Particle field
            const pCount = 180;
            const pPos   = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount; i++) {
                const r     = 8 + Math.random() * 7;
                const theta = Math.random() * Math.PI * 2;
                const phi   = Math.acos(2 * Math.random() - 1);
                pPos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
                pPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                pPos[i * 3 + 2] = r * Math.cos(phi);
            }
            const pGeo = new THREE.BufferGeometry();
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({
                color: SLATE, size: 0.045, transparent: true, opacity: 0.15,
            }));
            scene.add(particles);

            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);
                const t = clock.getElapsedTime();

                cardMeshes.forEach(({ mesh, baseY, phase }) => {
                    mesh.position.y = baseY + Math.sin(t * 0.4 + phase) * 0.12;
                    mesh.lookAt(camera.position);
                });

                particles.rotation.y = t * 0.010;
                particles.rotation.x = t * 0.005;

                controls.update();
                renderer.render(scene, camera);
            }

            animate();
        });

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>
</html>
